services:
  - type: web
    name: codequest-api
    runtime: node
    plan: free
    rootDir: back end
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_SITE_URL
        value: https://codequest.onrender.com
      - key: OPENROUTER_APP_NAME
        value: CodeQuest

  - type: web
    name: codequest
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://codequest-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
