<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="frontHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="backHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="dbHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="authHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="aiHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Arial', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px 'Arial', sans-serif; fill: #475569; }
      .groupTitle { font: 700 24px 'Arial', sans-serif; fill: #fff; }
      .label { font: 700 20px 'Arial', sans-serif; fill: #0f172a; }
      .text { font: 400 16px 'Arial', sans-serif; fill: #0f172a; }
      .small { font: 600 14px 'Arial', sans-serif; fill: #334155; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 2; }
      .panelSoft { fill: #ffffff; stroke: #dbeafe; stroke-width: 2; }
      .section { fill: #fff; stroke: #cbd5e1; stroke-width: 2; }
      .arrowBlue { stroke: #2563eb; stroke-width: 3.2; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #059669; stroke-width: 3.2; fill: none; marker-end: url(#arrowGreen); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 3.2; fill: none; marker-end: url(#arrowPurple); }
      .arrowOrange { stroke: #ea580c; stroke-width: 3.2; fill: none; marker-end: url(#arrowOrange); }
      .arrowTeal { stroke: #0f766e; stroke-width: 3.2; fill: none; marker-end: url(#arrowTeal); }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0f766e"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1800" height="1120" fill="url(#archBg)"/>
  <text x="900" y="58" text-anchor="middle" class="title">CodeQuest Full System Architecture</text>
  <text x="900" y="86" text-anchor="middle" class="subtitle">Integration of frontend, backend, database, JWT authentication, and AI assistant services</text>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="500" height="760" rx="22" class="panelSoft"/>
    <rect x="70" y="160" width="500" height="68" rx="22" fill="url(#frontHead)"/>
    <rect x="70" y="210" width="500" height="18" fill="url(#frontHead)"/>
    <text x="320" y="204" text-anchor="middle" class="groupTitle">Frontend Layer</text>

    <rect x="110" y="270" width="420" height="120" rx="16" class="section"/>
    <text x="320" y="320" text-anchor="middle" class="label">Authentication UI</text>
    <text x="320" y="350" text-anchor="middle" class="text">Login and registration forms</text>

    <rect x="110" y="430" width="420" height="120" rx="16" class="section"/>
    <text x="320" y="480" text-anchor="middle" class="label">Learning Dashboard and Courses</text>
    <text x="320" y="510" text-anchor="middle" class="text">Dashboard, progress, leaderboard, lessons</text>

    <rect x="110" y="590" width="420" height="120" rx="16" class="section"/>
    <text x="320" y="640" text-anchor="middle" class="label">Lesson Player</text>
    <text x="320" y="670" text-anchor="middle" class="text">Interactive lessons, quizzes, XP updates</text>

    <rect x="110" y="750" width="420" height="120" rx="16" class="section"/>
    <text x="320" y="800" text-anchor="middle" class="label">AI Assistant Interface</text>
    <text x="320" y="830" text-anchor="middle" class="text">Dashboard assistant and lesson assistant</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="120" width="520" height="860" rx="22" class="panel"/>
    <rect x="650" y="120" width="520" height="68" rx="22" fill="url(#backHead)"/>
    <rect x="650" y="170" width="520" height="18" fill="url(#backHead)"/>
    <text x="910" y="164" text-anchor="middle" class="groupTitle">Backend Layer</text>

    <rect x="700" y="230" width="420" height="100" rx="16" class="section"/>
    <text x="910" y="275" text-anchor="middle" class="label">Express Server</text>
    <text x="910" y="302" text-anchor="middle" class="text">Receives requests from the frontend</text>

    <rect x="700" y="365" width="420" height="100" rx="16" class="section"/>
    <text x="910" y="410" text-anchor="middle" class="label">Auth Routes</text>
    <text x="910" y="437" text-anchor="middle" class="text">Registration, login, token-based access</text>

    <rect x="700" y="500" width="420" height="100" rx="16" class="section"/>
    <text x="910" y="545" text-anchor="middle" class="label">Progress Routes</text>
    <text x="910" y="572" text-anchor="middle" class="text">Progress tracking, lessons, leaderboard</text>

    <rect x="700" y="635" width="420" height="100" rx="16" class="section"/>
    <text x="910" y="680" text-anchor="middle" class="label">Chat Route</text>
    <text x="910" y="707" text-anchor="middle" class="text">Context-aware AI assistant messaging</text>

    <rect x="700" y="770" width="420" height="150" rx="16" class="section"/>
    <text x="910" y="818" text-anchor="middle" class="label">Business Logic Layer</text>
    <text x="910" y="846" text-anchor="middle" class="text">Lesson completion, XP calculation, streak logic</text>
    <text x="910" y="874" text-anchor="middle" class="text">Prompt preparation and session management</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1250" y="160" width="470" height="300" rx="22" class="panel"/>
    <rect x="1250" y="160" width="470" height="68" rx="22" fill="url(#dbHead)"/>
    <rect x="1250" y="210" width="470" height="18" fill="url(#dbHead)"/>
    <text x="1485" y="204" text-anchor="middle" class="groupTitle">Database Layer</text>
    <text x="1290" y="290" class="text">MongoDB</text>
    <text x="1290" y="328" class="text">User collection</text>
    <text x="1290" y="366" class="text">UserProgress collection</text>
    <text x="1290" y="404" class="text">ChatSession collection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1250" y="520" width="470" height="180" rx="22" class="panel"/>
    <rect x="1250" y="520" width="470" height="68" rx="22" fill="url(#authHead)"/>
    <rect x="1250" y="570" width="470" height="18" fill="url(#authHead)"/>
    <text x="1485" y="564" text-anchor="middle" class="groupTitle">JWT Security Layer</text>
    <text x="1290" y="635" class="text">Generates token after successful login</text>
    <text x="1290" y="670" class="text">Protects progress and chat endpoints</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1250" y="760" width="470" height="220" rx="22" class="panel"/>
    <rect x="1250" y="760" width="470" height="68" rx="22" fill="url(#aiHead)"/>
    <rect x="1250" y="810" width="470" height="18" fill="url(#aiHead)"/>
    <text x="1485" y="804" text-anchor="middle" class="groupTitle">AI Service Layer</text>
    <text x="1290" y="872" class="text">OpenRouter API</text>
    <text x="1290" y="907" class="text">GPT-OSS Free model</text>
    <text x="1290" y="942" class="text">Optional Llama-based free model</text>
  </g>

  <path d="M530 330 L700 330" class="arrowBlue"/>
  <text x="615" y="312" text-anchor="middle" class="small">auth requests</text>

  <path d="M530 490 L700 550" class="arrowBlue"/>
  <text x="615" y="498" text-anchor="middle" class="small">course and progress data</text>

  <path d="M530 650 L700 650" class="arrowBlue"/>
  <text x="615" y="632" text-anchor="middle" class="small">lesson interactions</text>

  <path d="M530 810 L700 685" class="arrowTeal"/>
  <text x="620" y="760" text-anchor="middle" class="small">AI assistant requests</text>

  <path d="M1120 285 L1250 285" class="arrowPurple"/>
  <text x="1185" y="267" text-anchor="middle" class="small">read and write data</text>

  <path d="M1120 410 L1250 610" class="arrowOrange"/>
  <text x="1210" y="470" text-anchor="middle" class="small">issue and verify JWT</text>

  <path d="M1120 685 L1250 870" class="arrowTeal"/>
  <text x="1205" y="760" text-anchor="middle" class="small">AI prompt and response</text>

  <path d="M1485 700 L1485 760" class="arrowOrange"/>
  <text x="1515" y="736" class="small">secure AI access</text>

  <path d="M1485 460 L1485 520" class="arrowPurple"/>
  <text x="1515" y="496" class="small">user/session data</text>
</svg>
