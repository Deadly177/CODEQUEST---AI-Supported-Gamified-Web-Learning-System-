<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title { font: 700 30px 'Times New Roman', serif; fill: #000; }
      .subtitle { font: 400 16px 'Times New Roman', serif; fill: #000; }
      .entity { font: 700 22px 'Times New Roman', serif; fill: #000; }
      .field { font: 400 17px 'Times New Roman', serif; fill: #000; }
      .note { font: 400 15px 'Times New Roman', serif; fill: #000; }
      .small { font: 400 14px 'Times New Roman', serif; fill: #000; }
      .box { fill: #fff; stroke: #000; stroke-width: 2.2; }
      .head { fill: #f3f3f3; stroke: #000; stroke-width: 2.2; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
      .arrow { stroke: #000; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: #000; stroke-width: 1.8; stroke-dasharray: 8 6; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <rect width="1500" height="980" fill="#fff"/>

  <text x="750" y="58" text-anchor="middle" class="title">CodeQuest Database Diagram</text>
  <text x="750" y="86" text-anchor="middle" class="subtitle">MongoDB collections and embedded document structure used in the learning platform</text>

  <rect x="90" y="150" width="360" height="260" class="box"/>
  <rect x="90" y="150" width="360" height="54" class="head"/>
  <text x="270" y="185" text-anchor="middle" class="entity">User</text>
  <line x1="90" y1="204" x2="450" y2="204" class="line"/>
  <text x="115" y="238" class="field">_id : ObjectId</text>
  <text x="115" y="272" class="field">name : String</text>
  <text x="115" y="306" class="field">email : String (unique, lowercase)</text>
  <text x="115" y="340" class="field">passwordHash : String</text>
  <text x="115" y="374" class="field">createdAt : Date</text>
  <text x="115" y="404" class="field">updatedAt : Date</text>

  <rect x="560" y="150" width="420" height="330" class="box"/>
  <rect x="560" y="150" width="420" height="54" class="head"/>
  <text x="770" y="185" text-anchor="middle" class="entity">UserProgress</text>
  <line x1="560" y1="204" x2="980" y2="204" class="line"/>
  <text x="585" y="238" class="field">_id : ObjectId</text>
  <text x="585" y="272" class="field">userId : ObjectId (ref User, unique)</text>
  <text x="585" y="306" class="field">totalPoints : Number</text>
  <text x="585" y="340" class="field">streak : Number</text>
  <text x="585" y="374" class="field">lastActivityAt : Date | null</text>
  <text x="585" y="408" class="field">badges : [String]</text>
  <text x="585" y="442" class="field">courseProgress : [CourseProgress]</text>
  <text x="585" y="472" class="field">createdAt : Date</text>
  <text x="585" y="502" class="field">updatedAt : Date</text>

  <rect x="1100" y="150" width="320" height="190" class="box"/>
  <rect x="1100" y="150" width="320" height="54" class="head"/>
  <text x="1260" y="185" text-anchor="middle" class="entity">CourseProgress</text>
  <line x1="1100" y1="204" x2="1420" y2="204" class="line"/>
  <text x="1125" y="238" class="field">courseId : String</text>
  <text x="1125" y="272" class="field">completedLessonIds : [String]</text>
  <text x="1125" y="314" class="note">Embedded inside UserProgress</text>

  <rect x="300" y="600" width="420" height="300" class="box"/>
  <rect x="300" y="600" width="420" height="54" class="head"/>
  <text x="510" y="635" text-anchor="middle" class="entity">ChatSession</text>
  <line x1="300" y1="654" x2="720" y2="654" class="line"/>
  <text x="325" y="688" class="field">_id : ObjectId</text>
  <text x="325" y="722" class="field">userId : ObjectId (ref User)</text>
  <text x="325" y="756" class="field">threadKey : String</text>
  <text x="325" y="790" class="field">messages : [ChatMessage]</text>
  <text x="325" y="824" class="field">createdAt : Date</text>
  <text x="325" y="858" class="field">updatedAt : Date</text>
  <text x="325" y="890" class="small">Unique index: (userId, threadKey)</text>

  <rect x="900" y="620" width="360" height="220" class="box"/>
  <rect x="900" y="620" width="360" height="54" class="head"/>
  <text x="1080" y="655" text-anchor="middle" class="entity">ChatMessage</text>
  <line x1="900" y1="674" x2="1260" y2="674" class="line"/>
  <text x="925" y="708" class="field">role : String ('user' | 'assistant')</text>
  <text x="925" y="742" class="field">text : String</text>
  <text x="925" y="776" class="field">createdAt : Date</text>
  <text x="925" y="818" class="note">Embedded inside ChatSession</text>

  <path d="M450 280 L560 280" class="arrow"/>
  <text x="500" y="262" text-anchor="middle" class="small">1 : 1</text>
  <text x="500" y="302" text-anchor="middle" class="small">tracked by</text>

  <path d="M980 320 L1100 320" class="arrow"/>
  <text x="1040" y="302" text-anchor="middle" class="small">1 : many</text>
  <text x="1040" y="342" text-anchor="middle" class="small">embeds</text>

  <path d="M360 410 L360 520 L510 520 L510 600" class="arrow"/>
  <text x="410" y="500" text-anchor="middle" class="small">1 : many</text>
  <text x="410" y="538" text-anchor="middle" class="small">starts</text>

  <path d="M720 760 L900 760" class="arrow"/>
  <text x="810" y="742" text-anchor="middle" class="small">1 : many</text>
  <text x="810" y="782" text-anchor="middle" class="small">embeds</text>

  <path d="M1260 340 L1260 430 L1290 430" class="dashed"/>
  <text x="1240" y="456" text-anchor="end" class="note">Nested array structure</text>

  <path d="M1080 840 L1080 905 L1310 905" class="dashed"/>
  <text x="1330" y="910" class="note">Conversation messages stored per thread</text>
</svg>
